<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Створити акаунт</h2>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-control" placeholder="your@email.com">
        <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="error-text">
          Введіть коректний email
        </div>
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Мінімум 8 символів">
        <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="error-text">
          Пароль надто простий (мінімум 8 символів, 1 велика літера, 1 цифра , 1 спецсимвол)
        </div>
      </div>

      <div class="form-group">
        <label>Підтвердження пароля</label>
        <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Повторіть пароль">
        <div *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched" class="error-text">
          Паролі не співпадають
        </div>
      </div>

      <div *ngIf="serverError" class="error-text server-error">
        {{ serverError }}
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="card-btn btn-blue w-full">
        {{ isLoading ? 'Реєстрація...' : 'Зареєструватися' }}
      </button>

    </form>

    <p class="auth-footer">
      Вже маєте акаунт? <a routerLink="/login">Увійти</a>
    </p>
  </div>
</div>
