<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Увійти в акаунт</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-control" placeholder="your@email.com">
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error-text">
          Введіть коректний email
        </div>
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Ваш пароль">
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-text">
          Пароль обов'язковий
        </div>
      </div>

      <div *ngIf="serverError" class="error-text server-error">
        {{ serverError }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="card-btn btn-blue w-full">
        {{ isLoading ? 'Вхід...' : 'Увійти' }}
      </button>

    </form>

    <p class="auth-footer">
      Ще не маєте акаунту? <a routerLink="/register">Зареєструватися</a>
    </p>
  </div>
</div>
